<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>个人灵感库设置</title>
  <style>
    body { margin: 0; color: #1d1d1f; background: #f5f5f7; font: 14px/1.6 -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif; }
    main { max-width: 620px; margin: 56px auto; padding: 28px; background: white; border-radius: 18px; box-shadow: 0 12px 38px rgba(0,0,0,.08); }
    h1 { margin: 0 0 8px; font-size: 24px; }
    p { color: #6e6e73; }
    label { display: block; margin: 24px 0 8px; font-weight: 600; }
    input { box-sizing: border-box; width: 100%; padding: 12px 14px; border: 1px solid #d2d2d7; border-radius: 10px; font: inherit; }
    button { margin-top: 16px; padding: 10px 20px; color: white; background: #1677ff; border: 0; border-radius: 10px; font-weight: 600; cursor: pointer; }
    #status { min-height: 24px; margin-top: 12px; color: #16803c; }
    code { padding: 2px 6px; background: #f2f2f2; border-radius: 5px; }
  </style>
</head>
<body>
  <main>
    <h1>个人灵感库设置</h1>
    <p>本机开发默认使用 <code>http://localhost:5173</code>。以后把网页部署到自己的域名，只需在这里替换地址。</p>
    <label for="libraryUrl">灵感库网页地址</label>
    <input id="libraryUrl" type="url" placeholder="http://localhost:5173">
    <button id="save" type="button">保存设置</button>
    <div id="status" role="status"></div>
  </main>
  <script src="options.js"></script>
</body>
</html>
